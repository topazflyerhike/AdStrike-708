title: AdStrike - Password Attack Detection Rules
id: sast-password-001
status: production
description: |
  SAST detection rules for password attack techniques including password
  spraying (SMB/LDAP/Kerberos), credential stuffing, NTLM relay,
  brute force, username enumeration via kerbrute, and default credential checks.
author: AdStrike SAST Module
date: 2026-04-24
mitre_attack:
  - T1110.003  # Password Spraying
  - T1110.001  # Password Guessing
  - T1110.004  # Credential Stuffing
  - T1557      # Adversary-in-the-Middle (NTLM Relay)
  - T1589.001  # Gather Victim Identity Information — Email Addresses

rules:
# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: Password Spraying  (T1110.003)
# ─────────────────────────────────────────────────────────────────────────────
  - id: password-spray-001
    title: Password Spraying — Distributed Authentication Failures
    technique: T1110.003
    severity: high
    description: >
      Password spraying uses single password against many accounts to avoid
      lockout. Detection pattern: many 4625 failures from same source IP,
      each for different username, within short timeframe.
    event_sources:
      - windows_security_eventlog:
          event_ids: [4625]
          conditions:
            - field: LogonType
              value: "3"
            - field: SubStatus
              value: "0xC000006A"  # Wrong password (not 0xC0000064 = wrong username)
    detection:
      sigma_condition: |
        EventID=4625 AND LogonType=3 AND SubStatus="0xC000006A" AND
        count(distinct TargetUserName) by IpAddress > 10 within 30m AND
        count(distinct TargetUserName) / count(IpAddress) > 0.8  # Low fails per user
      spray_indicators:
        - Many unique usernames failing with same source IP
        - Failures with 30+ second intervals (jitter to avoid lockout)
        - Failures spread across multiple DCs simultaneously
        - Authentication attempts outside business hours
    tools_used:
      - "crackmapexec smb {dc} -u '{user_file}' -p '{spray_pass}' -d {dom} --continue-on-success --jitter 30"
      - "crackmapexec ldap {dc} -u '{user_file}' -p '{spray_pass}' -d {dom} --continue-on-success"
      - "Rubeus.exe brute /users:{file} /passwords:{file} /domain:{dom} /outfile:valid.txt"
      - "kerbrute passwordspray -d {dom} --dc {dc} {user_file} '{pass}'"
    false_positives:
      - Legitimate users forgetting passwords during policy change
      - Helpdesk testing new accounts
    remediation:
      - Implement account lockout policy (lockout after 5-10 failures, 30 min lockout)
      - Deploy fine-grained password policy for privileged accounts
      - Monitor for low-and-slow spray patterns
      - Enable Microsoft Defender for Identity spray detection
      - Implement MFA for all accounts

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: Kerbrute — Username Enumeration  (T1589.001)
# ─────────────────────────────────────────────────────────────────────────────
  - id: password-kerbrute-enum-001
    title: Kerbrute Username Enumeration via Kerberos Pre-Auth
    technique: T1589.001
    severity: medium
    description: >
      Kerbrute enumerates valid usernames using Kerberos AS-REQ pre-auth errors.
      Valid users return different error code than invalid users, allowing
      enumeration without authentication. Doesn't trigger lockouts.
    event_sources:
      - windows_security_eventlog:
          event_ids: [4768]
          conditions:
            - field: ResultCode
              values:
                - "0x6"   # KDC_ERR_C_PRINCIPAL_UNKNOWN (user not found)
                - "0x18"  # KDC_ERR_PREAUTH_FAILED (user found, wrong pre-auth)
    detection:
      sigma_condition: |
        EventID=4768 AND ResultCode IN ["0x6", "0x18"] AND
        count() by IpAddress > 50 within 60s
      indicators:
        - Many AS-REQ errors (0x6 = user not found vs 0x18 = user found)
        - Rapid Kerberos requests from single source
        - Pattern of sequential usernames (john, john.doe, j.doe, jdoe)
    tools_used:
      - "kerbrute userenum -d {dom} --dc {dc} {user_file}"
      - "kerbrute passwordspray -d {dom} --dc {dc} {user_file} '{pass}'"
    remediation:
      - Rate limit Kerberos AS-REQ from single source
      - Monitor bulk 4768 errors (ResultCode=0x6) from same IP
      - Use honeypot accounts that alert on any auth attempt

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: NTLM Relay via Responder  (T1557)
# ─────────────────────────────────────────────────────────────────────────────
  - id: password-ntlm-relay-001
    title: NTLM Relay via Responder — SMB Signing Bypass
    technique: T1557
    severity: critical
    description: >
      NTLM relay captures authentication from poisoned LLMNR/NBT-NS and
      relays it to target systems without SMB signing. Enables code execution
      or AD object modification without knowing the password.
    event_sources:
      - windows_security_eventlog:
          event_ids: [4624]
          conditions:
            - field: LogonType
              value: "3"
            - field: AuthenticationPackage
              value: "NTLM"
      - network_capture:
          protocol: LLMNR
          port: 5355
    detection:
      sigma_condition: |
        EventID=4624 AND LogonType=3 AND AuthenticationPackage=NTLM AND
        IpAddress IN LLMNR_poison_candidates AND
        NOT IpAddress IN trusted_management_hosts
    tools_used:
      - "sudo responder -I eth0 -rdw"
      - "impacket-ntlmrelayx -tf {targets_file} -smb2support -c 'whoami' --output-file relay.txt"
    remediation:
      - Enable SMB Signing (required) on all systems
      - Disable NTLM authentication (use Kerberos)
      - Disable LLMNR and NBT-NS (prevents poisoning)
      - Enable EPA on LDAP and ADCS

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: Credential Stuffing  (T1110.004)
# ─────────────────────────────────────────────────────────────────────────────
  - id: password-credential-stuffing-001
    title: Credential Stuffing — Breached Credential List Against AD
    technique: T1110.004
    severity: high
    description: >
      Testing breached username:password pairs against Active Directory.
      Pattern similar to password spraying but with matched pairs — each
      account tested with its previously-breached password.
    event_sources:
      - windows_security_eventlog:
          event_ids: [4625, 4776]
    detection:
      sigma_condition: |
        EventID=4625 AND LogonType=3 AND
        count(distinct TargetUserName) by IpAddress > 30 within 60m AND
        count(distinct TargetUserName) / count() > 0.5  # Each user tested once (not brute force)
    tools_used:
      - "crackmapexec smb {dc} -d {dom} --continue-on-success --no-bruteforce -u {creds_file} -p {creds_file}"
    remediation:
      - Compare AD user passwords against HaveIBeenPwned database
      - Enable Microsoft Entra Password Protection (leaked password detection)
      - Implement MFA as defense against credential stuffing

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: Default Credential Check  (T1078.001)
# ─────────────────────────────────────────────────────────────────────────────
  - id: password-default-creds-001
    title: Default Credential Testing — Common Service Account Passwords
    technique: T1078.001
    severity: high
    description: >
      Testing default credentials for common service accounts (admin/admin,
      administrator/password123, sa/sa, etc.) against SMB and other services.
    detection:
      sigma_condition: |
        EventID=4624 AND LogonType=3 AND
        TargetUserName IN ["administrator", "admin", "guest", "sa", "service"] AND
        IpAddress NOT IN known_admin_hosts
    tools_used:
      - "crackmapexec smb {dc} -u '{user}' -p '{default_pass}' -d {dom}"
    remediation:
      - Disable default accounts (Guest, local Administrator)
      - Rename default administrator account
      - Enforce complex passwords during account creation
      - Audit service accounts with password=username or weak passwords

# ─────────────────────────────────────────────────────────────────────────────
# SAST CODE ANALYSIS
# ─────────────────────────────────────────────────────────────────────────────
sast_code_analysis:
  file: modules/password_attacks.py
  rules:
    - id: sast-code-password-001
      title: Jitter Value Not Validated — Possible Account Lockout
      severity: high
      pattern: |
        delay\s+=\s+prompt\("Jitter seconds.*recommended.*"\)\s+or\s+"30"
      description: >
        Jitter value from user input not validated as integer ≥ 30 seconds.
        If operator enters value < lockout threshold (e.g. 1 second), spray
        could trigger domain-wide account lockout — massive operational impact.
      recommendation: "Validate jitter >= min_safe_jitter (30s) and warn if below lockout threshold"

    - id: sast-code-password-002
      title: --continue-on-success Required for Spray — Verify Always Set
      severity: medium
      pattern: |
        crackmapexec smb.*--continue-on-success
      description: >
        --continue-on-success is correctly used to prevent stopping at first
        valid credential (which would alert on single lockout). Good practice.

    - id: sast-code-password-003
      title: Credentials File Path Not Validated
      severity: medium
      pattern: |
        cfile\s+=\s+prompt\("Credentials file.*"\)
      description: >
        Credentials file path taken from user input without existence check.
        crackmapexec will fail silently if file not found.
      recommendation: "Validate file exists before passing to tool: os.path.isfile(cfile)"
